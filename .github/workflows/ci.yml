name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile bot.py
        run: python -m py_compile bot.py

      - name: Check for common secret files
        run: |
          set -euo pipefail
          if find . -type f \( -name "auth.json" -o -name ".env" -o -name "cli-config.json" \) | grep -q .; then
            echo "Sensitive files were detected in the repository."
            exit 1
          fi

      - name: Verify home/ is not tracked
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^home/'; then
            echo "Tracking content under home/ is not allowed."
            exit 1
          fi
